<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>InvoiceAI — Invoice Processing Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="/frontend/assets/css/styles.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════════════════
     AUTH SCREEN
═══════════════════════════════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo-line">
        <div class="auth-logo-mark">
          <svg viewBox="0 0 20 20"><path d="M4 3h12a1 1 0 0 1 1 1v2H3V4a1 1 0 0 1 1-1zm-1 5h14v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V8zm4 3a1 1 0 0 0 0 2h6a1 1 0 0 0 0-2H7zm0 4a1 1 0 0 0 0 2h4a1 1 0 0 0 0-2H7z"/></svg>
        </div>
        <span class="auth-product-name">Invoice<em>AI</em></span>
      </div>
      <div class="auth-tagline">AI-powered invoice extraction for Indian GST</div>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab active" data-tab="login" onclick="switchTab('login')">Sign In</div>
      <div class="auth-tab" data-tab="register" onclick="switchTab('register')">Register</div>
    </div>
    <div class="auth-body">

      <!-- Login Form -->
      <div class="auth-form visible" id="form-login">
        <div id="login-error"></div>
        <div class="field">
          <label>Email address</label>
          <input type="email" id="login-email" placeholder="you@company.com" autocomplete="email" />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">
          Sign In
        </button>
        <div class="auth-demo-hint">
          Demo credentials — <strong>demo@invoiceai.in</strong> / <strong>demo1234</strong>
        </div>
      </div>

      <!-- Register Form -->
      <div class="auth-form" id="form-register">
        <div id="register-error"></div>
        <div class="field">
          <label>Email address</label>
          <input type="email" id="reg-email" placeholder="you@company.com" />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="reg-pass" placeholder="Minimum 6 characters" />
        </div>
        <button class="btn btn-primary btn-full" id="reg-btn" onclick="doRegister()">
          Create Account
        </button>
      </div>

    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     MAIN SHELL
═══════════════════════════════════════════════════════ -->
<div id="shell" style="display:none">

  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 20 20"><path d="M4 3h12a1 1 0 0 1 1 1v2H3V4a1 1 0 0 1 1-1zm-1 5h14v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V8zm4 3a1 1 0 0 0 0 2h6a1 1 0 0 0 0-2H7zm0 4a1 1 0 0 0 0 2h4a1 1 0 0 0 0-2H7z"/></svg>
      </div>
      <div class="logo-wordmark">Invoice<em>AI</em></div>
    </div>

    <div class="sidebar-nav">
      <div class="nav-group-label">Main</div>
      <div class="nav-item active" id="nav-dashboard" onclick="go('dashboard')">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M2 4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V4zm10 0a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2h-2a2 2 0 0 1-2-2V4zm0 8a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2a2 2 0 0 1-2-2v-4zM2 13a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-3z"/></svg>
        Dashboard
      </div>
      <div class="nav-item" id="nav-upload" onclick="go('upload')">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M9.293 1.293a1 1 0 0 1 1.414 0l4 4a1 1 0 0 1-1.414 1.414L11 4.414V13a1 1 0 1 1-2 0V4.414L6.707 6.707a1 1 0 0 1-1.414-1.414l4-4zM3 15a1 1 0 0 1 1-1h12a1 1 0 0 1 0 2H4a1 1 0 0 1-1-1z"/></svg>
        Upload Invoice
      </div>
      <div class="nav-item" id="nav-invoices" onclick="go('invoices')">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M5 3a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2H5zm1 5h8a1 1 0 0 1 0 2H6a1 1 0 0 1 0-2zm0 4h8a1 1 0 0 1 0 2H6a1 1 0 0 1 0-2zm0 4h4a1 1 0 0 1 0 2H6a1 1 0 0 1 0-2z"/></svg>
        All Invoices
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-user" onclick="doLogout()">
        <div class="user-avatar" id="user-avatar">?</div>
        <div style="min-width:0">
          <div class="user-name" id="user-name-display">Loading…</div>
          <div class="user-role">Click to sign out</div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <div class="topbar-left">
        <span class="topbar-page" id="topbar-page">Dashboard</span>
        <span class="topbar-sep" id="topbar-sep" style="display:none">›</span>
        <span class="topbar-crumb" id="topbar-crumb" style="display:none"></span>
      </div>
      <div class="topbar-actions">
        <div class="api-status">
          <div class="status-dot" id="api-dot"></div>
          <span id="api-url">localhost:8000</span>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="go('upload')">
          <svg width="12" height="12" viewBox="0 0 20 20" fill="currentColor"><path d="M9.293 1.293a1 1 0 0 1 1.414 0l4 4a1 1 0 0 1-1.414 1.414L11 4.414V13a1 1 0 1 1-2 0V4.414L6.707 6.707a1 1 0 0 1-1.414-1.414l4-4z"/></svg>
          Upload
        </button>
      </div>
    </div>
    <div id="page-content"></div>
  </div>
</div>

<div id="toast-root"></div>

<script src="/frontend/assets/js/app.js" defer></script>
</body>
</html>
