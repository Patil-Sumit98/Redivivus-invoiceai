apiVersion: apps/v1
kind: Deployment
metadata:
  name: invoiceai-frontend
  namespace: invoiceai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: invoiceai-frontend
  template:
    metadata:
      labels:
        app: invoiceai-frontend
    spec:
      containers:
        - name: frontend
          image: <AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/redivivus-frontend:latest
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
