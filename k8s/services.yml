apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: invoiceai
spec:
  selector:
    app: invoiceai-backend
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: invoiceai
spec:
  selector:
    app: invoiceai-frontend
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
