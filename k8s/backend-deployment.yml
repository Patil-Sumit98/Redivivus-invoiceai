apiVersion: apps/v1
kind: Deployment
metadata:
  name: invoiceai-backend
  namespace: invoiceai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: invoiceai-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # zero-downtime deploy
  template:
    metadata:
      labels:
        app: invoiceai-backend
      annotations:
        prometheus.io/scrape: "true"   # Prometheus auto-discovers this
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          image: <AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/redivivus-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: invoiceai-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: invoiceai-secrets
                  key: JWT_SECRET
            - name: AZURE_DOCUMENT_INTELLIGENCE_KEY
              valueFrom:
                secretKeyRef:
                  name: invoiceai-secrets
                  key: AZURE_DOCUMENT_INTELLIGENCE_KEY
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: invoiceai-backend-hpa
  namespace: invoiceai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: invoiceai-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
